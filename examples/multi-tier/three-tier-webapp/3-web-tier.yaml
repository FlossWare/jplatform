# Web Tier - NGINX Reverse Proxy Container
# This container serves static content and proxies to the app tier
# Deploy third: jplatform deploy 3-web-tier.yaml

applicationId: nginx-web
name: NGINX Web Server
description: Web tier running NGINX as reverse proxy

# Container Configuration
properties:
  container.image: "nginx:alpine"
  container.runtime: "docker"  # or "podman"
  
  # Port mappings (host:container)
  container.ports: "8080:80,8443:443"
  
  # Volume mounts for nginx config and static content
  container.volumes: |
    /var/lib/jplatform/apps/nginx-web/nginx.conf:/etc/nginx/nginx.conf:ro
    /var/lib/jplatform/apps/nginx-web/html:/usr/share/nginx/html:ro
  
  # Environment variables
  container.env: |
    NGINX_HOST=localhost
    NGINX_PORT=80
  
  # Network configuration
  container.network: "bridge"

# Resource Quotas (light for web tier)
resources:
  cpu: 2
  memory: 2048  # 2GB
  disk: 10240   # 10GB

# Dependencies - Web tier depends on app tier
dependencies:
  - spring-app  # Wait for application server to start

# Health Check
healthCheck:
  enabled: true
  interval: 30
  timeout: 5
  retries: 3

# Monitoring
monitoring:
  enabled: true
  prometheus: true
  interval: 30

# Tags
tags:
  tier: web
  environment: production
  workload-type: container
  web-server: nginx
  version: "alpine"

